<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Trình phát Bài giảng — Auto‑Scroll Bật Sẵn</title>
  <style>
    :root {
      --bar-bg: rgba(0, 0, 0, 0.7);
      --bar-fg: #ffffff;
      --accent: #0d6efd;
      --ok: #28a745;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #000;
      overflow: hidden;
      /* trải nghiệm xem slide */
    }

    .player-container {
      background: #fff;
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      /* để đặt thanh điều khiển */
    }

    /* Fallback cho Zalo/WebView không hỗ trợ API Fullscreen */
    .player-container.pseudo-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99999;
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* 🔥 FORCE LANDSCAPE MODE (Cho Mobile Portrait) */
    .player-container.force-landscape {
      position: fixed;
      top: 0;
      left: 100vw;
      /* Đẩy sang mép phải để xoay về */
      width: 100vh;
      height: 100vw;
      z-index: 99999;
      background: #000;
      transform-origin: top left;
      transform: rotate(90deg);
      /* Ẩn thanh cuộn mặc định nếu có */
      overflow: hidden;
    }

    .slide-viewer {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow-y: auto;
      flex-grow: 1;
      position: relative;
      background: #000;
    }

    .slide-viewer img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Chế độ Fit (không cuộn) */
    .slide-viewer.fit-mode {
      overflow: hidden;
    }

    .slide-viewer.fit-mode img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Thanh điều khiển dưới cùng */
    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px;
      /* Tăng padding bottom cho các dòng iPhone đời mới */
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bar-bg), transparent);
      transition: transform 0.35s ease-in-out;
      transform: translateY(0);
      color: var(--bar-fg);
    }

    /* Ẩn thanh khi không tương tác */
    .player-container.inactive .bottom-bar {
      transform: translateY(100%);
    }

    .timeline-container {
      width: 100%;
      padding: 4px 0;
      margin-bottom: 6px;
    }

    .progress-bar-wrapper {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 5px;
      cursor: pointer;
      padding: 4px 0;
    }

    .progress-bar {
      background: var(--accent);
      width: 0%;
      height: 8px;
      border-radius: 5px;
      transition: width 0.1s linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-top: 4px;
      text-shadow: 1px 1px 2px #000;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .controls button {
      color: #fff;
      background: rgba(0, 0, 0, 0.3);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.25s;
    }

    .controls button:hover {
      background: rgba(0, 0, 0, 0.45);
    }

    #play-pause-btn {
      background: var(--ok);
      width: 50px;
      height: 50px;
      font-size: 24px;
    }

    .slide-counter {
      flex: 1;
      text-align: center;
      font-weight: 700;
      text-shadow: 1px 1px 2px #000;
    }

    /* ===================== CSS MỚI CHO LOADING ===================== */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 10;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .loading-overlay.visible {
      visibility: visible;
      opacity: 1;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 14px;
      text-shadow: 1px 1px 2px #000;
    }
  </style>
</head>

<body>
  <div id="player-container" class="player-container">
    <div id="slide-viewer" class="slide-viewer" aria-label="Khu vực hiển thị slide" tabindex="0">
      <img id="slide-image" src="" alt="Slide" />
      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" class="loading-text">Đang tải dữ liệu...</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="timeline-container">
        <div id="progress-bar-wrapper" class="progress-bar-wrapper">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="time-display">
          <span id="current-time">00:00</span>
          <span id="total-duration">00:00</span>
        </div>
      </div>

      <div class="controls">
        <button id="prev-btn" title="Slide trước">⏪</button>
        <button id="play-pause-btn" title="Phát/Tạm dừng">▶️</button>
        <div id="slide-counter" class="slide-counter">— / —</div>
        <button id="next-btn" title="Slide tiếp theo">⏩</button>
        <button id="autoscroll-btn" title="Bật/Tắt Tự cuộn">🔄</button>
        <button id="scale-btn" title="Chế độ xem">⛶</button>
        <button id="fullscreen-btn" title="Toàn màn hình">🖼️</button>
      </div>
    </div>

    <!-- Audio Element ẩn -->
    <audio id="slide-audio" preload="auto"></audio>
  </div>

  <script>
    /* ===================== CẤU HÌNH ===================== */
    const TOTAL_SLIDES = 29;
    const IMAGE_PREFIX = 'images/slide-';
    const AUDIO_PREFIX = 'audio/slide_';
    const IMG_EXT = '.png';
    const AUD_EXT = '.mp3';

    /* ==================== QUẢN LÝ TÀI NGUYÊN (New) ==================== */
    class ResourceManager {
      constructor() {
        this.cache = new Map(); // Lưu trữ trạng thái load: 'loading', 'loaded', 'error'
        this.blobs = new Map(); // Lưu trữ Blob URL nếu cần (nhưng ở đây ta preload qua Image/Audio obj)
        this.maxRetries = 5;
        this.retryDelay = 1500; // ms
      }

      // Tạo key duy nhất cho resource
      getKey(type, index) { return `${type}_${index}`; }

      // Tải ảnh có retry
      loadImage(index) {
        const key = this.getKey('image', index);
        if (this.cache.has(key)) return this.cache.get(key);

        const src = `${IMAGE_PREFIX}${index}${IMG_EXT}`;
        const promise = new Promise((resolve, reject) => {
          let attempts = 0;

          const tryLoad = () => {
            attempts++;
            const img = new Image();
            img.src = src;
            img.onload = () => resolve(src); // Trả về src gốc vì browser sẽ cache
            img.onerror = () => {
              console.warn(`[Image] Lỗi tải slide ${index} (Lần ${attempts})`);
              if (attempts < this.maxRetries) {
                setTimeout(tryLoad, this.retryDelay * attempts); // Exponential backoff nhẹ
              } else {
                reject(new Error(`Không thể tải ảnh slide ${index}`));
              }
            };
          };
          tryLoad();
        });

        this.cache.set(key, promise);
        return promise;
      }

      // Tải audio có retry
      loadAudio(index) {
        const key = this.getKey('audio', index);
        if (this.cache.has(key)) return this.cache.get(key);

        const src = `${AUDIO_PREFIX}${index}${AUD_EXT}`;
        const promise = new Promise((resolve, reject) => {
          let attempts = 0;

          const tryLoad = () => {
            attempts++;
            // Dùng fetch để kiểm tra chắc chắn file tồn tại và tải về buffer dòng chảy nếu cần
            // Tuy nhiên để đơn giản và tận dụng browser cache, ta dùng Audio object
            const audio = new Audio();
            audio.preload = 'auto';
            audio.src = src;

            // Xử lý sự kiện load
            const onSuccess = () => {
              cleanup();
              resolve(src);
            };
            const onError = () => {
              cleanup();
              console.warn(`[Audio] Lỗi tải audio ${index} (Lần ${attempts})`);
              if (attempts < this.maxRetries) {
                setTimeout(tryLoad, this.retryDelay * attempts);
              } else {
                reject(new Error(`Không thể tải audio slide ${index}`));
              }
            };

            const cleanup = () => {
              audio.removeEventListener('canplaythrough', onSuccess);
              audio.removeEventListener('error', onError);
            };

            audio.addEventListener('canplaythrough', onSuccess); // Đủ dữ liệu để phát
            audio.addEventListener('error', onError);
            audio.load();
          };
          tryLoad();
        });

        this.cache.set(key, promise);
        return promise;
      }

      // Tải cả bộ cho 1 slide
      loadSlide(index) {
        return Promise.all([
          this.loadImage(index),
          this.loadAudio(index)
        ]);
      }
    }

    /* ==================== BIẾN TOÀN CỤC ==================== */
    const resourceManager = new ResourceManager();
    const playerContainer = document.getElementById('player-container');
    const slideViewer = document.getElementById('slide-viewer');
    const slideImage = document.getElementById('slide-image');
    const slideAudio = document.getElementById('slide-audio');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    const autoscrollBtn = document.getElementById('autoscroll-btn');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const slideCounter = document.getElementById('slide-counter');
    const scaleBtn = document.getElementById('scale-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const progressBarWrap = document.getElementById('progress-bar-wrapper');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeEl = document.getElementById('current-time');
    const totalDurationEl = document.getElementById('total-duration');

    let isFitMode = false;
    let scrollAnimationId = null;
    let currentSlideIndex = 1; // Slide bắt đầu từ 1
    let isAutoscrollEnabled = true;

    /* ================= UI HELPER ================= */
    function showLoading(show, message = "Đang tải...") {
      loadingText.textContent = message;
      if (show) loadingOverlay.classList.add('visible');
      else loadingOverlay.classList.remove('visible');
    }

    function syncAutoscrollUI() {
      autoscrollBtn.classList.toggle('active', isAutoscrollEnabled);
    }

    /* ================= LOGIC CHÍNH ================= */
    async function showSlide(index) {
      // Validate index
      if (index < 1) index = 1;
      if (index > TOTAL_SLIDES) index = TOTAL_SLIDES;
      currentSlideIndex = index;

      // Stop current playback
      slideAudio.pause();
      cancelAnimationFrame(scrollAnimationId);
      showLoading(true, `Đang tải slide ${index}...`);

      // Update nút điều hướng
      prevBtn.disabled = (index === 1);
      nextBtn.disabled = (index === TOTAL_SLIDES);
      slideCounter.textContent = `${index} / ${TOTAL_SLIDES}`;

      try {
        // 1. Tải resources của slide hiện tại (hoặc lấy từ cache)
        await resourceManager.loadSlide(index);

        // 2. Gán source (lúc này đã nằm trong cache trình duyệt)
        slideImage.src = `${IMAGE_PREFIX}${index}${IMG_EXT}`;
        slideAudio.src = `${AUDIO_PREFIX}${index}${AUD_EXT}`;

        // 3. Reset view
        slideViewer.scrollTop = 0;
        showLoading(false);

        // 4. Phát audio & Auto-scroll
        try {
          await slideAudio.play();
          startAutoScrollIfNeeded();
        } catch (err) {
          console.log("Autoplay blocked or waiting for interaction", err);
          playPauseBtn.innerHTML = '▶️'; // Hiển thị nút play
        }

        // 5. Preload các slide tiếp theo (Chiến lược thông minh)
        preloadNextSlides(index);

      } catch (error) {
        console.error(error);
        showLoading(true, "Mạng không ổn định. Đang thử lại...");
        // Tự động thử lại sau 3s nếu lỗi
        setTimeout(() => showSlide(index), 3000);
      }
    }

    function preloadNextSlides(currentIndex) {
      // Preload 2 slide tiếp theo
      for (let i = 1; i <= 2; i++) {
        const nextIdx = currentIndex + i;
        if (nextIdx <= TOTAL_SLIDES) {
          resourceManager.loadSlide(nextIdx).catch(err => console.log(`Preload failed for ${nextIdx}`, err));
        }
      }
    }

    /* ================== AUTO SCROLL & AUDIO ================== */
    function startAutoScrollIfNeeded() {
      if (isAutoscrollEnabled && !isFitMode && !slideAudio.paused && !slideAudio.ended) {
        cancelAnimationFrame(scrollAnimationId);
        scrollAnimationId = requestAnimationFrame(autoScroll);
      }
    }

    function autoScroll() {
      if (!isAutoscrollEnabled || isFitMode || slideAudio.paused || slideAudio.ended) return;
      const dur = slideAudio.duration || 0;
      const cur = slideAudio.currentTime || 0;
      if (dur > 0) {
        const scrollable = slideViewer.scrollHeight - slideViewer.clientHeight;
        const top = (cur / dur) * scrollable;
        slideViewer.scrollTop = top;
      }
      scrollAnimationId = requestAnimationFrame(autoScroll);
    }

    /* ================= LISTENERS ================= */
    slideAudio.addEventListener('play', () => {
      playPauseBtn.innerHTML = '⏸️';
      startAutoScrollIfNeeded();
    });
    slideAudio.addEventListener('pause', () => {
      playPauseBtn.innerHTML = '▶️';
      cancelAnimationFrame(scrollAnimationId);
    });
    slideAudio.addEventListener('ended', () => {
      if (currentSlideIndex < TOTAL_SLIDES) {
        // Tự động chuyển slide tiếp theo
        showSlide(currentSlideIndex + 1);
      }
    });

    // Time Update & Progress Bar
    slideAudio.addEventListener('timeupdate', () => {
      if (!isNaN(slideAudio.duration) && slideAudio.duration > 0) {
        const pct = (slideAudio.currentTime / slideAudio.duration) * 100;
        progressBar.style.width = `${pct}%`;
        currentTimeEl.textContent = formatTime(slideAudio.currentTime);
      }
    });
    slideAudio.addEventListener('loadedmetadata', () => {
      if (!isNaN(slideAudio.duration)) totalDurationEl.textContent = formatTime(slideAudio.duration);
    });

    // Seek
    progressBarWrap.addEventListener('click', (ev) => {
      if (!slideAudio.duration) return;
      const rect = progressBarWrap.getBoundingClientRect();
      const ratio = (ev.clientX - rect.left) / rect.width;
      slideAudio.currentTime = ratio * slideAudio.duration;
    });

    // Buttons
    playPauseBtn.addEventListener('click', () => {
      if (slideAudio.paused) slideAudio.play();
      else slideAudio.pause();
    });

    prevBtn.addEventListener('click', () => {
      if (currentSlideIndex > 1) showSlide(currentSlideIndex - 1);
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlideIndex < TOTAL_SLIDES) showSlide(currentSlideIndex + 1);
    });

    autoscrollBtn.addEventListener('click', () => {
      isAutoscrollEnabled = !isAutoscrollEnabled;
      syncAutoscrollUI();
      if (isAutoscrollEnabled) startAutoScrollIfNeeded();
      else cancelAnimationFrame(scrollAnimationId);
    });

    scaleBtn.addEventListener('click', () => {
      isFitMode = !isFitMode;
      slideViewer.classList.toggle('fit-mode', isFitMode);
      scaleBtn.innerHTML = isFitMode ? '↕️' : '⛶';
      if (isFitMode) cancelAnimationFrame(scrollAnimationId);
      else startAutoScrollIfNeeded();
    });

    // Fullscreen logic cải tiến cho Zalo
    function toggleFullscreen() {
      // Kiểm tra xem có đang ở chế độ pseudo-fullscreen không
      const isPseudo = playerContainer.classList.contains('pseudo-fullscreen');
      const isNative = !!document.fullscreenElement;

      if (!isNative && !isPseudo) {
        // Thử bật fullscreen native
        document.documentElement.requestFullscreen()
          .then(() => {
            // Thành công native
            screen.orientation.lock('landscape').catch(() => { });
          })
          .catch(err => {
            console.log("Fullscreen native bị chặn, chuyển sang chế độ giả lập (Zalo/Webview)", err);
            // Fallback: Maximize container bằng CSS
            playerContainer.classList.add('pseudo-fullscreen');
            fullscreenBtn.innerHTML = 'X';

            // Ép xoay ngang nếu có thể
            if (screen.orientation && typeof screen.orientation.lock === 'function') {
              screen.orientation.lock('landscape').catch(() => { });
            }
          });
      } else {
        // Đang full (native hoặc pseudo) -> Thoát
        if (isNative) {
          document.exitFullscreen();
        }
        playerContainer.classList.remove('pseudo-fullscreen');
        fullscreenBtn.innerHTML = '🖼️';

        if (screen.orientation && typeof screen.orientation.unlock === 'function') {
          screen.orientation.unlock();
        }
      }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    // Lắng nghe thay đổi native để cập nhật nút và class
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        // Người dùng thoát bằng nút ESC hoặc vuốt
        playerContainer.classList.remove('pseudo-fullscreen');
        fullscreenBtn.innerHTML = '🖼️';
      } else {
        fullscreenBtn.innerHTML = 'X';
      }
    });

    // Controls Visibility
    let inactivityTimer;
    function showControlsAndResetTimer() {
      playerContainer.classList.remove('inactive');
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        if (!slideAudio.paused) playerContainer.classList.add('inactive');
      }, 3000);
    }
    playerContainer.addEventListener('mousemove', showControlsAndResetTimer);
    playerContainer.addEventListener('click', showControlsAndResetTimer);
    playerContainer.addEventListener('touchstart', showControlsAndResetTimer);

    // Helpers
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    /* ================= 🔥 TỰ ĐỘNG XOAY NGANG (FORCED LANDSCAPE) ================= */
    function checkOrientation() {
      // Phát hiện thiết bị di động cơ bản
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      // Nếu là mobile VÀ màn hình đang ở chiều dọc (cao > rộng)
      if (isMobile && window.innerHeight > window.innerWidth) {
        playerContainer.classList.add('force-landscape');
      } else {
        playerContainer.classList.remove('force-landscape');
      }
    }

    // Lắng nghe sự kiện xoay và resize
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);

    /* ================= INIT ================= */
    window.addEventListener('load', () => {
      showControlsAndResetTimer();
      syncAutoscrollUI();
      checkOrientation(); // Kiểm tra hướng ngay khi tải
      // Bắt đầu
      showSlide(currentSlideIndex);
    });
  </script>
</body>

</html>
